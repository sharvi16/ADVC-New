# configs/base.yaml
# Single source of truth for all experiment hyperparameters.
# All scripts read from this file — never hardcode values elsewhere.

# Reproducibility
seed: 42

# Models
models:
  deit_small:
    timm_name: "deit_small_patch16_224"
    hf_name: "facebook/deit-small-patch16-224"
    num_classes: 1000
    input_size: 224

# Compression
compression:
  levels: ["fp32", "int8", "int4"]
  int8:
    backend: "bitsandbytes"
    method: "Linear8bitLt"   # true int8 via bitsandbytes — requires sm_70+ (T4 is sm_75)
  int4:
    backend: "bitsandbytes"
    load_in_4bit: true
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_compute_dtype: "float16"

# Dataset
dataset:
  name: "imagenette"   # change to "cifar10" or "cifar100" when running those
  val_subset_size: 3925   # ImageNette val has ~3925 images total — use all of them
  train_subset_size: 9469  # ImageNette train has ~9469 images total — use all of them
  image_size: 224
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  # Kaggle: attach adityakane/imagenette2 in notebook settings.
  # Extract the archive once per session (see CLAUDE.md → Kaggle session startup).
  val_dir: "/kaggle/working/imagenette2/val"
  train_dir: "/kaggle/working/imagenette2/train"

datasets:
  imagenet:
    num_classes: 1000

  imagenette:
    val_dir: "data/imagenette2-320/val"
    train_dir: "data/imagenette2-320/train"
    num_classes: 1000   # remapped to ImageNet-1k indices

  cifar10:
    num_classes: 10
    download: true
    image_size: 224     # upsampled from 32x32

  cifar100:
    num_classes: 100
    download: true
    image_size: 224

  tinyimagenet:
    num_classes: 200
    image_size: 224

# Attack - FGSM
fgsm:
  name: "fgsm"
  eps: 0.03137 #adds noise
  targeted: false

# Attack - PGD
pgd:
  eps: 0.03137      # 8/255 — same as FGSM
  alpha: 0.00784    # 2/255 — step size
  steps: 20         # standard in robustness literature

# Attack - Adversarial Patch
patch:
  patch_size: 32    # 32x32 patch on 224x224 image (~2% of image area)
  steps: 150        # patch needs more steps than PGD
  lr: 0.05

# Defense - Adversarial Training (AT)
defense:
  name: "adversarial_training"
  epochs: 7
  optimizer: "adamw"
  # Per-compression learning rates.
  # AdamW + layer-freezing requires much lower LRs than SGD full fine-tune.
  # INT8/INT4 quantised weights are especially fragile — keep LR tiny.
  lr:
    fp32: 0.00001
    int8: 0.000005
    int4: 0.000001
  weight_decay: 0.01
  warmup_epochs: 1   # epoch 1 runs at lr/10; full lr from epoch 2 onward
  batch_size: 16     # T4 16GB — keep at 16 for training stability
  at_eps: 0.03137    # 8/255 — must match attack epsilon
  save_every_epoch: true

# Defense - AT + Knowledge Distillation (AT+KD)
at_kd:
  temperature: 4.0   # softmax temperature for soft labels
  alpha: 0.5         # weight for CE loss; (1-alpha) weights KL loss

# Evaluation
eval:
  batch_size: 32     # T4 16GB handles 32 comfortably for DeiT-S inference
  num_workers: 2     # Kaggle gives 4 CPU cores; 2 workers avoids DataLoader overhead

# Paths
paths:
  results_dir: "results"
  figures_dir: "results/figures"
  checkpoints_at_dir: "results/checkpoints/at"
  checkpoints_atkd_dir: "results/checkpoints/atkd"
  finetuned_dir: "checkpoints/finetuned"

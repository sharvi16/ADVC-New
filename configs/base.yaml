# configs/base.yaml
# Single source of truth for all experiment hyperparameters.
# All scripts read from this file — never hardcode values elsewhere.

# Reproducibility
seed: 42

# Models
models:
  deit_small:
    timm_name: "deit_small_patch16_224"
    hf_name: "facebook/deit-small-patch16-224"
    num_classes: 1000
    input_size: 224

# Compression
compression:
  levels: ["int8", "int4"]
  int8:
    backend: "bitsandbytes"
    load_in_8bit: true
  int4:
    backend: "bitsandbytes"
    load_in_4bit: true
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_compute_dtype: "float16"

# Dataset
dataset:
  name: "imagenet1k"
  val_subset_size: 5000
  train_subset_size: 10000
  image_size: 224
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  # Paths are relative to the project root. Copy the dataset into data/imagenet/
  # each session (see CLAUDE.md → Dataset), or set an absolute path on the
  # lab server below.
  val_dir: "data/imagenet/val"
  train_dir: "data/imagenet/train"

# Attack - FGSM
fgsm:
  name: "fgsm"
  eps: 0.03137 #adds noise
  targeted: false

# Attack - PGD
pgd:
  eps: 0.03137      # 8/255 — same as FGSM
  alpha: 0.00784    # 2/255 — step size
  steps: 20         # standard in robustness literature

# Attack - Adversarial Patch
patch:
  patch_size: 32    # 32x32 patch on 224x224 image (~2% of image area)
  steps: 150        # patch needs more steps than PGD
  lr: 0.05

# Defense - Adversarial Training (AT)
defense:
  name: "adversarial_training"
  epochs: 7
  optimizer: "adamw"
  # Per-compression learning rates.
  # AdamW + layer-freezing requires much lower LRs than SGD full fine-tune.
  # INT8/INT4 quantised weights are especially fragile — keep LR tiny.
  lr:
    fp32: 0.00001
    int8: 0.000005
    int4: 0.000001
  weight_decay: 0.01
  warmup_epochs: 1   # epoch 1 runs at lr/10; full lr from epoch 2 onward
  batch_size: 16     # reduced from 32 for 8GB VRAM H100 slice
  at_eps: 0.03137    # 8/255 — must match attack epsilon
  save_every_epoch: true

# Defense - AT + Knowledge Distillation (AT+KD)
at_kd:
  temperature: 4.0   # softmax temperature for soft labels
  alpha: 0.5         # weight for CE loss; (1-alpha) weights KL loss

# Evaluation
eval:
  batch_size: 32     # reduced from 64 for 8GB VRAM H100 slice
  num_workers: 0     # 1 CPU core — multiprocessing DataLoader deadlocks with 1 core

# Paths
paths:
  results_dir: "results"
  figures_dir: "results/figures"
  checkpoints_at_dir: "results/checkpoints/at"
  checkpoints_atkd_dir: "results/checkpoints/atkd"
